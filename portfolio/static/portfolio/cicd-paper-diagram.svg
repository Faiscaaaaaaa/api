<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" width="1200" height="760">
  <defs>
    <style>
      .paper { fill: #fbf5e8; }
      .box { fill: #ffffff; stroke: #1f2937; stroke-width: 3; rx: 18; ry: 18; }
      .label { font-family: Inter, sans-serif; font-size: 24px; fill: #111827; font-weight: 700; }
      .small { font-family: Inter, sans-serif; font-size: 16px; fill: #475569; }
      .arrow { fill: none; stroke: #111827; stroke-width: 8; marker-end: url(#arrow); }
      .note { font-family: Inter, sans-serif; font-size: 18px; fill: #334155; }
      .headline { font-family: Inter, sans-serif; font-size: 30px; fill: #111827; font-weight: 700; }
      .subheadline { font-family: Inter, sans-serif; font-size: 18px; fill: #475569; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#111827" />
    </marker>
  </defs>

  <rect width="1200" height="760" rx="36" ry="36" fill="#fff7e6" />
  <rect x="40" y="30" width="1120" height="120" rx="28" ry="28" fill="#ffffff" stroke="#e2e8f0" stroke-width="3" />
  <text x="70" y="70" class="headline">Arquitetura do Sistema e Pipeline CI/CD</text>
  <text x="70" y="100" class="subheadline">Diagrama inspirado no desenho de papel: desenvolvimento local, repositório, CI/CD, produção e armazenamento.</text>

  <g transform="translate(80, 180)">
    <rect class="box" x="0" y="0" width="300" height="150" />
    <text x="20" y="40" class="label">Navegador</text>
    <text x="20" y="72" class="small">User Browser</text>
    <text x="20" y="98" class="small">Cliente frontend</text>
  </g>

  <g transform="translate(440, 130)">
    <rect class="box" x="0" y="0" width="320" height="170" />
    <text x="20" y="50" class="label">Django App</text>
    <text x="20" y="82" class="small">Docker Container</text>
    <text x="20" y="108" class="small">Static Files + App</text>
  </g>

  <g transform="translate(840, 120)">
    <rect class="box" x="0" y="0" width="300" height="140" />
    <text x="20" y="45" class="label">Neon PostgreSQL</text>
    <text x="20" y="80" class="small">Base de dados</text>
  </g>

  <g transform="translate(840, 300)">
    <rect class="box" x="0" y="0" width="300" height="140" />
    <text x="20" y="45" class="label">Cloudinary</text>
    <text x="20" y="80" class="small">Armazenamento de media</text>
  </g>

  <g transform="translate(80, 340)">
    <rect class="box" x="0" y="0" width="320" height="140" />
    <text x="20" y="45" class="label">Codespaces</text>
    <text x="20" y="80" class="small">Ambiente de desenvolvimento</text>
    <text x="20" y="108" class="small">Edição e testes locais</text>
  </g>

  <g transform="translate(420, 420)">
    <rect class="box" x="0" y="0" width="300" height="140" />
    <text x="20" y="45" class="label">GitHub Repo</text>
    <text x="20" y="80" class="small">Código e versionamento</text>
  </g>

  <g transform="translate(760, 450)">
    <rect class="box" x="0" y="0" width="320" height="140" />
    <text x="20" y="45" class="label">GitHub Actions</text>
    <text x="20" y="80" class="small">CI/CD pipeline</text>
    <text x="20" y="108" class="small">testes, build, deploy</text>
  </g>

  <path class="arrow" d="M380 255 L440 255" />
  <path class="arrow" d="M770 255 L840 255" />
  <path class="arrow" d="M1000 200 L1000 240" />
  <path class="arrow" d="M1000 340 L1000 380" />

  <path class="arrow" d="M220 410 L420 410" />
  <path class="arrow" d="M520 500 L760 500" />
  <path class="arrow" d="M880 500 L880 320" />

  <rect x="80" y="620" width="1040" height="110" rx="18" ry="18" fill="#ffffff" stroke="#e2e8f0" stroke-width="3" />
  <text x="100" y="650" class="label">Componentes do diagrama:</text>
  <text x="100" y="680" class="small">1. Browser: interface do utilizador onde o portfólio é acedido.</text>
  <text x="100" y="705" class="small">2. Django App em Docker: backend e static files servidos em produção.</text>
  <text x="100" y="730" class="small">3. Neon PostgreSQL: base de dados relacional para utilizadores, artigos e comentários.</text>
  <text x="100" y="755" class="small">4. Cloudinary: armazenamento de imagens e media usado pelo portfolio.</text>
  <text x="100" y="780" class="small">5. Codespaces: desenvolvimento local e testes.</text>
  <text x="100" y="805" class="small">6. GitHub Repository: reposítório com código e histórico.</text>
  <text x="100" y="830" class="small">7. GitHub Actions: pipeline que automatiza testes, build e deploy.</text>
</svg>