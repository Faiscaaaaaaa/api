{% extends 'portfolio/base.html' %}
{% block content %}

<div class="auth-wrapper">
    <div class="auth-card">

        <div class="auth-header">
            <span class="auth-logo">🔐</span>
            <h2>Iniciar Sessão</h2>
        </div>

        {% if messages %}
        <div class="auth-messages">
            {% for message in messages %}
            <p class="auth-msg auth-msg--{{ message.tags }}">{{ message }}</p>
            {% endfor %}
        </div>
        {% endif %}

        <!-- Login normal -->
        <form method="post" class="auth-form">
            {% csrf_token %}
            <div class="field">
                <label for="username">Utilizador</label>
                <input type="text" name="username" id="username" placeholder="o teu username" required>
            </div>
            <div class="field">
                <label for="password">Palavra-passe</label>
                <input type="password" name="password" id="password" placeholder="••••••••" required>
            </div>
            <div class="auth-actions">
                <button type="submit" class="btn-primary">Entrar</button>
                <a href="{% url 'accounts:register' %}" class="btn-ghost">Criar conta</a>
            </div>
        </form>

        <div class="auth-divider"><span>ou</span></div>

        <!-- Magic link -->
        <div class="magic-section">
            <p class="magic-label">Entra sem password com um link mágico</p>
            <form action="{% url 'accounts:login_magic_link' %}" method="get" class="auth-form magic-form">
                <div class="field field--inline">
                    <input type="email" name="email" placeholder="o teu email" required>
                    <button type="submit" class="btn-magic">Enviar ✉️</button>
                </div>
            </form>
        </div>

    </div>
</div>

<style>
.auth-wrapper {
    min-height: 80vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
}

.auth-card {
    width: 100%;
    max-width: 420px;
    background: var(--card-bg, #1a1a2e);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 2.5rem 2rem;
    box-shadow: 0 12px 48px rgba(0,0,0,0.35);
    animation: fadeUp 0.4s ease both;
}

.auth-header {
    text-align: center;
    margin-bottom: 2rem;
}
.auth-logo { font-size: 2.5rem; display: block; margin-bottom: 0.5rem; }
.auth-header h2 { font-size: 1.5rem; font-weight: 700; margin: 0; }

.auth-messages { margin-bottom: 1rem; }
.auth-msg {
    padding: 0.6rem 1rem;
    border-radius: 8px;
    font-size: 0.9rem;
    margin-bottom: 0.4rem;
}
.auth-msg--error   { background: rgba(220,50,50,0.15); color: #ff7b7b; border: 1px solid rgba(220,50,50,0.3); }
.auth-msg--success { background: rgba(50,200,100,0.15); color: #6ee89a; border: 1px solid rgba(50,200,100,0.3); }
.auth-msg--info    { background: rgba(80,150,255,0.15); color: #89b8ff; border: 1px solid rgba(80,150,255,0.3); }

.auth-form { display: flex; flex-direction: column; gap: 1rem; }

.field { display: flex; flex-direction: column; gap: 0.4rem; }
.field label { font-size: 0.82rem; font-weight: 600; letter-spacing: 0.05em; color: var(--text-muted, #aaa); text-transform: uppercase; }
.field input {
    background: rgba(0,0,0,0.04);
    border: 1.5px solid rgba(0,0,0,0.25);
    border-radius: 10px;
    padding: 0.75rem 1rem;
    color: inherit;
    font-size: 0.95rem;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
    width: 100%;
}
.field input:focus {
    border-color: var(--accent, #5b8dee);
    box-shadow: 0 0 0 3px rgba(91,141,238,0.15);
}
.field input::placeholder { color: rgba(255,255,255,0.25); }

.auth-actions {
    display: flex;
    gap: 0.75rem;
    margin-top: 0.5rem;
}

.btn-primary {
    flex: 1;
    padding: 0.75rem;
    background: var(--accent, #5b8dee);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
}
.btn-primary:hover { background: #4a7de0; transform: translateY(-1px); }
.btn-primary:active { transform: translateY(0); }

.btn-ghost {
    flex: 1;
    padding: 0.75rem;
    background: transparent;
    color: var(--text-muted, #555);
    border: 1.5px solid rgba(0,0,0,0.25);
    border-radius: 10px;
    font-size: 0.95rem;
    text-align: center;
    text-decoration: none;
    transition: border-color 0.2s, transform 0.1s;
}
.btn-ghost:hover { border-color: rgba(0,0,0,0.5); transform: translateY(-1px); }
.btn-ghost:active { transform: translateY(0); }

.auth-divider {
    text-align: center;
    margin: 1.5rem 0;
    position: relative;
}
.auth-divider::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 0; right: 0;
    height: 1px;
    background: rgba(255,255,255,0.08);
}
.auth-divider span {
    position: relative;
    background: var(--card-bg, #1a1a2e);
    padding: 0 0.75rem;
    font-size: 0.8rem;
    color: var(--text-muted, #aaa);
    text-transform: uppercase;
    letter-spacing: 0.1em;
}

.magic-section { text-align: center; }
.magic-label {
    font-size: 0.85rem;
    color: var(--text-muted, #aaa);
    margin-bottom: 0.75rem;
}

.field--inline {
    flex-direction: row;
    align-items: center;
    gap: 0.5rem;
}
.field--inline input { flex: 1; }

.btn-magic {
    padding: 0.75rem 1rem;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    color: inherit;
    font-size: 0.9rem;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.2s;
}
.btn-magic:hover { background: rgba(255,255,255,0.12); }

@keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
}
</style>

{% endblock %}
